<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактировать дело</title>
    <style>
        a {
            text-decoration: none;
            color: #0066cc;
        }
    </style>
</head>
<body>
    <h1>Редактировать дело: {{ todo.title }}</h1>
    
    <a href="{% url 'todo_list' %}">← Назад к списку</a>
    
    <hr>
    
    <form method="post">
        {% csrf_token %}
        
        <div>
            <label>{{ form.title.label }}:</label><br>
            {{ form.title }}
        </div>
        
        <div>
            <label>{{ form.note.label }}:</label><br>
            {{ form.note }}
        </div>
        
        <br>
        <button type="submit">Сохранить</button>
    </form>
</body>
</html>
