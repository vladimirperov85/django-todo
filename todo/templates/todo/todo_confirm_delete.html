<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Подтверждение удаления</title>
    <style>
        a {
            text-decoration: none;
            color: #0066cc;
        }
    </style>
</head>
<body>
    <h2>Подтверждение удаления</h2>
    
    <div style="background: #fff3cd; padding: 15px; border: 1px solid #ffc107; border-radius: 5px;">
        <p>Вы действительно хотите удалить дело:</p>
        <h3>"{{ todo.title }}"</h3>
        <p><small>Это действие нельзя будет отменить.</small></p>
    </div>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit" style="background: #dc3545; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">Да, удалить</button>
        <a href="{% url 'todo_list' %}" style="background: #6c757d; color: white; padding: 10px 20px; border-radius: 5px; display: inline-block; margin-left: 10px;">Отмена</a>
    </form>
    
    <hr>
    <a href="/">Главная</a> | <a href="{% url 'logout' %}">Выйти</a>
</body>
</html>
