<!-- todo/templates/todo/todo_create.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Новое дело</title>
    <style>
        a {
            text-decoration: none;  /* ← Убираем подчёркивание */
            color: #0066cc;
        }
    </style>
</head>
<body>
    <h1>Новое дело</h1>
    
    <a href="{% url 'todo_list' %}">← Назад к списку дел</a>
    
    <hr>
    
    <form method="post">
        {% csrf_token %}
        
        <p>
            <label for="title">Название дела</label><br>
            {{ form.title }}
            {% if form.title.errors %}
                <span style="color: red;">{{ form.title.errors }}</span>
            {% endif %}
        </p>
        
        <p>
            <label for="note">Примечание</label><br>
            {{ form.note }}
            {% if form.note.errors %}
                <span style="color: red;">{{ form.note.errors }}</span>
            {% endif %}
        </p>
        
        <button type="submit">Создать дело</button>
    </form>
</body>
</html>
